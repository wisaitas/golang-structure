apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceId"\s*:\s*"([^"]+)"'
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View in Tempo"
        - datasourceUid: loki
          matcherRegex: '"traceId"\s*:\s*"([^"]+)"'
          name: "Related Logs"
          url: '/explore?left=["now-1h","now","Loki",{"expr":"{compose_service=~\".+\"} |= \"$${__value.raw}\""}]'
          urlDisplayLabel: "Search TraceID in Logs"

  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: false
        customQuery: true
        query: '{compose_service=~".+"} |= "$${__trace.traceId}"'
      tracesToMetrics:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
