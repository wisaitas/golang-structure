services:
  # ── Application Services ──────────────────────────────────────────────
  golang-structure:
    build:
      context: .
      dockerfile: deployment/golang-structure/Dockerfile
    container_name: golang-structure
    command: ["./bin/golangstructure"]
    ports:
      - 8080:8080
    environment:
      SERVICE_NAME: golang-structure-service
      SERVICE_PORT: 8080
      SERVICE_STAGE: dev
      MASK_PATTERN: '{"password":"4:2","email":"4:com"}'
      SQLDB_HOST: postgres
      SQLDB_PORT: 5432
      SQLDB_USER: admin
      SQLDB_PASSWORD: postgres
      SQLDB_DB_NAME: golang-structure-db
      SQLDB_SSL_MODE: disable
      SQLDB_MAX_IDLE_CONNS: 10
      SQLDB_MAX_OPEN_CONNS: 100
      SQLDB_CONN_MAX_LIFETIME: 1h
      SQLDB_DRIVER: postgres
    labels:
      logging: "true"
      logging_jobname: "golang-structure"
    depends_on:
      atlas-migrate:
        condition: service_completed_successfully
    networks:
      - app-network

  # ── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: golang-structure-db
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d golang-structure-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Database Migration ──────────────────────────────────────────────
  atlas-migrate:
    image: arigaio/atlas:latest
    container_name: atlas-migrate
    command: >
      migrate apply
      --url "postgres://admin:postgres@postgres:5432/golang-structure-db?sslmode=disable"
      --dir "file:///migrations"
    volumes:
      - ./deployment/atlas/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ── Observability ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    ports:
      - 3100:3100
    volumes:
      - ./deployment/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    ports:
      - 3200:3200   # HTTP
      - 4317:4317   # OTLP gRPC
      - 4318:4318   # OTLP HTTP
    volumes:
      - ./deployment/tempo/tempo-config.yaml:/etc/tempo/tempo.yaml
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    ports:
      - 9090:9090
    volumes:
      - ./deployment/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    networks:
      - app-network

  alloy:
    image: grafana/alloy:v1.8.3
    container_name: alloy
    ports:
      - 12345:12345   # Alloy UI
    volumes:
      - ./deployment/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    depends_on:
      - loki
    networks:
      - app-network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
      - 3001:3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: dark
      GF_EXPLORE_ENABLED: "true"
    volumes:
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning
      - ./deployment/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - app-network

volumes:
  postgres-data:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  app-network:
    driver: bridge
